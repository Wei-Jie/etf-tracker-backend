spring:
  application:
    name: etf-tracker
  datasource:
    # 敏感資訊請透過環境變數設定，不可硬寫在此檔案
    # 本機開發：請在 IDE Run Config 或系統環境變數中設定 DB_URL / DB_USERNAME / DB_PASSWORD
    # 參考範例請見 application-local.yml.example
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:weijie.etf.notifier@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

app:
  api-key: ${API_KEY:default-dev-secret-key}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
